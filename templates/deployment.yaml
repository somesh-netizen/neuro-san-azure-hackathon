{{- range .Values.openaiKeys }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuro-san-key-{{ .id }}
  namespace: neuro-san-{{ $.Values.environment }}
  labels:
    app: neuro-san
    keyId: {{ .id | quote }}
spec:
  {{- if not $.Values.hpa.enabled }}
  replicas: {{ $.Values.replicasPerKey }}
  {{- end }}
  # Each key-Deployment is a single pod pinned to its own dedicated node.
  # maxSurge:0 means the old pod is removed before the new one schedules, so a
  # rolling upgrade reuses the freed node instead of demanding 11 spare D16s at
  # once. Brief per-pod gap (~startup) is fine during a maintenance window.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: neuro-san
      keyId: {{ .id | quote }}
  template:
    metadata:
      labels:
        app: neuro-san
        keyId: {{ .id | quote }}
    spec:
      {{- if $.Values.backendNodepool }}
      # Pin backend pods to the dedicated D16s_v3 pool (AKS labels nodes with
      # agentpool=<poolname>). Keeps them off the small system/UI/ingress pool.
      nodeSelector:
        agentpool: {{ $.Values.backendNodepool }}
      {{- end }}
      # Belt-and-suspenders on top of the 12-vCPU request: prefer never to place
      # two backend pods on the same host even if scheduling gets creative.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: neuro-san
                topologyKey: kubernetes.io/hostname
      serviceAccount: unileaf-account
      serviceAccountName: unileaf-account
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: neuro-san
          image: "{{ $.Values.image.neuroSan.repository }}:{{ $.Values.image.neuroSan.tag }}"
          imagePullPolicy: {{ $.Values.image.neuroSan.pullPolicy }}
          env:
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  key: AZURE_OPENAI_API_KEY
                  name: openai-key-{{ .id }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  key: AZURE_OPENAI_API_KEY
                  name: openai-key-{{ .id }}
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  key: AZURE_OPENAI_ENDPOINT
                  name: openai-key-{{ .id }}
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  key: AZURE_STORAGE_CONNECTION_STRING
                  name: azure-storage
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          envFrom:
            - configMapRef:
                name: neuro-san-env
          ports:
            - containerPort: 8080
          # startupProbe gates the pod for up to 100 s (20 + 16×5) while the
          # Python process initialises. Once it passes, readinessProbe takes over.
          # This prevents NGINX from routing traffic to a pod before it is truly
          # ready, which was the root cause of cold-start 503 spikes.
          startupProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 16   # 20 + 16×5 = 100 s max before pod is killed
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 0   # startupProbe already handled the wait
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3      # 30 s of failure before marked unready
          # NO livenessProbe — deliberately removed. Under high concurrent SSE load the
          # single event loop couldn't answer /livez in time, so the kubelet SIGKILL'd
          # healthy-but-busy pods (10 restarts each in the 2700-VU test), destroying all
          # in-flight designs and cascading into 502s. Readiness alone sheds load
          # gracefully (pod marked NotReady when jammed → NGINX stops routing → drains →
          # recovers) without ever killing the pod. A true deadlock is now handled by a
          # manual rollout-restart rather than an over-eager auto-kill.
          resources:
            requests:
              memory: {{ $.Values.resources.requests.memory }}
              {{- if $.Values.resources.requests.cpu }}
              cpu: {{ $.Values.resources.requests.cpu }}
              {{- end }}
            limits:
              memory: {{ $.Values.resources.limits.memory }}
              {{- if $.Values.resources.limits.cpu }}
              cpu: {{ $.Values.resources.limits.cpu }}
              {{- end }}
          {{- if $.Values.llmConfigEnabled }}
          volumeMounts:
            - name: llm-config
              mountPath: {{ include "neuro-san.app-source" $ }}/config/llm_config.hocon
              subPath: llm_config.hocon
              readOnly: true
      volumes:
        - name: llm-config
          configMap:
            name: neuro-san-llm-config
          {{- end }}
---
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ui-node
  name: ui-node-deployment
  namespace: neuro-san-{{ .Values.environment }}
spec:
  progressDeadlineSeconds: 360
  replicas: {{ .Values.uiReplicas | default 1 }}
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: ui-node
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ui-node
    spec:
      automountServiceAccountToken: true
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
      - env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              key: AZURE_OPENAI_API_KEY
              name: openai-key-1
        - name: AZURE_OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              key: AZURE_OPENAI_API_KEY
              name: openai-key-1
        - name: ENABLE_AUTHENTICATION
          value: "false"
        - name: NEXTAUTH_URL
          value: "https://hackathon.evolution.ml"
        - name: NEXTAUTH_SECRET
          value: "hackathon-secret"
        - name: AUTH0_CLIENT_ID
          value: "disabled"
        - name: AUTH0_CLIENT_SECRET
          value: "disabled"
        - name: AUTH0_DOMAIN
          value: "disabled"
        - name: AUTH0_ISSUER
          value: "disabled"
        - name: LOGO_SERVICE_TOKEN
          value: "disabled"
        envFrom:
        - configMapRef:
            name: ui-node-env
        image: "{{ .Values.image.ui.repository }}:{{ .Values.image.ui.tag }}"
        imagePullPolicy: IfNotPresent
        name: ui-node-server
        resources:
          requests:
            cpu: "500m"      # was unset — give the scheduler a real reservation
            memory: 1Gi
          limits:
            cpu: "2"         # raised from 1 for the concurrent page-load burst
            memory: 6Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      # Spread the UI replicas across nodes so one node loss doesn't drop the shell.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: ui-node
                topologyKey: kubernetes.io/hostname
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/os: linux
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: unileaf-account
      serviceAccountName: unileaf-account
      terminationGracePeriodSeconds: 30
