apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: 2504436@cognizant.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx-frontend
        selector:
          dnsNames:
            - neurosanhackathon.eastus.cloudapp.azure.com
      - http01:
          ingress:
            ingressClassName: nginx-backend
        selector:
          dnsNames:
            - neurosanhackathon-api.eastus.cloudapp.azure.com
