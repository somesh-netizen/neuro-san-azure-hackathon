apiVersion: v1
kind: Service
metadata:
  name: neuro-san-svc
  namespace: neuro-san-{{ .Values.environment }}
  labels:
    app: neuro-san
spec:
  type: ClusterIP
  internalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: neuro-san
  # sessionAffinity: None — NGINX ingress controller talks directly to pod IPs
  # via the Endpoints API (bypasses kube-proxy entirely). Cookie-based stickiness
  # is handled at the NGINX layer (NSROUTE cookie, affinity-mode=balanced+ewma).
  # Keeping ClientIP here would pin ALL internal cluster traffic (health checks,
  # other pods) to one backend based on the NGINX pod's source IP — wrong behaviour.
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: ui-node-service
  namespace: neuro-san-{{ .Values.environment }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      protocol: TCP
      targetPort: 3000
  selector:
    app: ui-node
  sessionAffinity: None
