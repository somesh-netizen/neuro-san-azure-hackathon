environment: hackathon
datadog:
  enabled: false
  clusterName: neuro-san-hackathon

# One Deployment per Azure OpenAI key; replicasPerKey pods each.
# 11 keys × 1 pod each = 11 pods total.
# Each pod uses a distinct Azure OpenAI resource (distinct endpoint + key).
# Each resource has a 30M TPM quota → Total quota: 11 × 30M = 330M TPM.
# NOTE: tokens are NOT the bottleneck (a CPU-bound pod burns <10M TPM); the
# real ceiling is CPU. See templates/deployment.yaml resources + node pool.
#
# Key → Resource mapping:
#  1  → 25083-mqryb3vb-southcentralus      (existing)
#  2  → azure-openai-cognizant-ai-lab       (existing)
#  3  → 2508345-2051-resource               (existing)
#  4  → 25083-mqry1k59-northcentralus       (existing)
#  5  → 25083-mqqgolnd-centralus            (existing)
#  6  → 25083-mqqgg6gs-swedencentral        (existing)
#  7  → 25083-mqszfieo-westus               (new)
#  8  → 25083-mqt02653-westeurope           (new)
#  9  → DROPPED: 25083-mqsztdx2-southeastasia had NO model deployment
#       (Southeast Asia lacks gpt-4o-mini GlobalStandard entitlement). The pod
#       reported Ready but every LLM call 404'd → ~8% of sticky users failed.
#  10 → 25083-mqt06fkz-francecentral        (new)
#  11 → 25083-mqszostk-westus3              (new)
#  12 → 25083-mqszy2vy-southindia           (new)
openaiKeys:
  - id: "1"
  - id: "2"
  - id: "3"
  - id: "4"
  - id: "5"
  - id: "6"
  - id: "7"
  - id: "8"
  - id: "10"
  - id: "11"
  - id: "12"
# 1 = the validated 11-pod fleet (one pod per key). THIS is the deployable default.
# SCALE-UP OPTION (to cut the ~11-min saturated design time toward ~5 min by raising the
# ~70 -> ~210 designs/min throughput ceiling): set this to 3 => 33 backend pods. Token-safe
# (33 pods share the 11 keys at ~13% of each key's 30M limit). BUT it requires BOTH:
#   (1) pool16 scaled to 33x D16 nodes, and
#   (2) a Standard DSv3 vCPU quota increase in eastus (current limit 350; 33 pods + loadpool
#       + system ~= 556 vCPU — 22 pods already needs >350).
# Do NOT set >1 until pool16 has the matching node count, or the excess pods stay Pending.
# See "Load testing details july 9th 2026 morning.md" §7 for the full rationale.
replicasPerKey: 1

# Backend pods are pinned to a dedicated D16s_v3 node pool, one pod per node.
# A 12-vCPU CPU request guarantees exactly one backend pod lands per node
# (2 × 12 = 24 > ~15 allocatable), eliminating the noisy-neighbour CPU
# contention that caused the 94%-error soak collapse. No CPU limit → a pod can
# burst to the whole node during a design fan-out.
backendNodepool: "pool16"

image:
  ui:
    repository: neurosanhackathonacr.azurecr.io/neuro-san/neuro-san-ui
    tag: "0.0.3"
    pullPolicy: IfNotPresent
  neuroSan:
    repository: neurosanhackathonacr.azurecr.io/neuro-san/neuro-san-studio
    tag: "0.0.3"
    pullPolicy: IfNotPresent

resources:
  requests:
    memory: "8Gi"      # was 3Gi
    cpu: "12"          # guarantees 1 backend pod per D16s_v3 node (dedicated CPU)
  limits:
    memory: "48Gi"     # was 6Gi → pods hit 97.6% of 6Gi and OOMKilled 7-8× under load
                       # with 16 server processes. D16 = 64GB, 1 pod/node, so 48Gi is
                       # safe headroom (leaves ~16GB for the OS) and eliminates OOM.
    # no cpu limit on purpose: let a design fan-out burst to the full node

# UI (Next.js) serves the app shell + light API routes to the login wave.
# replicas:1 was a single funnel for 2500 concurrent page loads → scale out.
# (Auth is currently OFF; if you enable Auth0 for the event, raise this further.)
# 6 replicas × 500m = 3 vCPU on the D4 system pool (nodepool1) — comfortable.
uiReplicas: 6

# Azure Workload Identity
# Fill in UAMI_CLIENT_ID after running: az identity show -g <RG> -n neuro-san-wi --query clientId -o tsv
azure:
  workloadIdentityClientId: "31036678-9d77-4e78-840b-93fba4233a90"
  keyVaultUrl: "https://neuro-san-hackathon-kv.vault.azure.net"

ingress:
  enabled: true
  # Backend and frontend get separate NGINX controllers -> separate public IPs
  neuroSan:
    className: nginx-backend
  ui:
    className: nginx-frontend

# Fill these in AFTER the cluster is up and NGINX controllers have their public IPs:
#   kubectl -n ingress-nginx-backend get svc ingress-nginx-backend-controller
#   kubectl -n ingress-nginx-frontend get svc ingress-nginx-frontend-controller
NEURO_SAN_SERVER_URL: "https://neurosanhackathon-api.eastus.cloudapp.azure.com"
AGENT_ALLOW_CORS_HEADERS: "true"
AGENT_RESERVATIONS_EXTERNAL_STORAGE_CHECK_PERIOD_SECONDS: "30"
AGENT_EXTERNAL_SERVER_URL: "https://neurosanhackathon-api.eastus.cloudapp.azure.com"
AGENT_SESSION_REQUIRE_HTTPS: "false"

# Azure Blob Storage for shared session state across all 4 key-pods
AGENT_EXTERNAL_RESERVATIONS_STORAGE: "neuro_san_studio.azure_blob_reservations_storage.AzureBlobReservationsStorage"
AGENT_RESERVATIONS_BLOB_CONTAINER: "neuro-san-reservations"

AGENT_NETWORK_DESIGNER_USE_RESERVATIONS: true
AGENT_NETWORK_DESIGNER_RESERVATIONS_LIFETIME_IN_SECONDS: 604800
AGENT_NETWORK_DESIGNER_PROGRESS_STYLE: connectivity
AGENT_MAX_CONCURRENT_REQUESTS: "250"
# Fork one HTTP server process (own event loop) per core. Default is 1 → a single
# event loop that maxed ~1 of the D16's 16 cores and saturated on concurrent SSE
# streams (couldn't answer /livez → pods were killed). 16 uses the whole node.
AGENT_HTTP_SERVER_INSTANCES: "16"
LEAF_LOG_SENSITIVE: "true"

# Azure OpenAI shared config (same deployment name and API version for all pods).
# Each pod gets its own AZURE_OPENAI_API_KEY and AZURE_OPENAI_ENDPOINT from its K8s secret.
OPENAI_API_VERSION: "2025-04-01-preview"
AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-5-mini"

hpa:
  enabled: false

llmConfigEnabled: true
llmConfigVariant: cluster

langfuse:
  enabled: false
  host: ""
