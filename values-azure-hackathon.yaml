environment: hackathon
datadog:
  enabled: false
  clusterName: neuro-san-hackathon

# One Deployment per Azure OpenAI key; replicasPerKey pods each.
# 12 keys × 1 pod each = 12 pods total.
# Each pod uses a distinct Azure OpenAI resource (distinct endpoint + key).
# Each resource has a 10M TPM quota → Total quota: 12 × 10M = 120M TPM.
#
# Key → Resource mapping:
#  1  → 25083-mqryb3vb-southcentralus      (existing)
#  2  → azure-openai-cognizant-ai-lab       (existing)
#  3  → 2508345-2051-resource               (existing)
#  4  → 25083-mqry1k59-northcentralus       (existing)
#  5  → 25083-mqqgolnd-centralus            (existing)
#  6  → 25083-mqqgg6gs-swedencentral        (existing)
#  7  → 25083-mqszfieo-westus               (new)
#  8  → 25083-mqt02653-westeurope           (new)
#  9  → 25083-mqsztdx2-southeastasia        (new)
#  10 → 25083-mqt06fkz-francecentral        (new)
#  11 → 25083-mqszostk-westus3              (new)
#  12 → 25083-mqszy2vy-southindia           (new)
openaiKeys:
  - id: "1"
  - id: "2"
  - id: "3"
  - id: "4"
  - id: "5"
  - id: "6"
  - id: "7"
  - id: "8"
  - id: "9"
  - id: "10"
  - id: "11"
  - id: "12"
replicasPerKey: 1

image:
  ui:
    repository: neurosanhackathonacr.azurecr.io/neuro-san/neuro-san-ui
    tag: "0.0.3"
    pullPolicy: IfNotPresent
  neuroSan:
    repository: neurosanhackathonacr.azurecr.io/neuro-san/neuro-san-studio
    tag: "0.0.3"
    pullPolicy: IfNotPresent

resources:
  requests:
    memory: "2000Mi"
  limits:
    memory: "3000Mi"

# Azure Workload Identity
# Fill in UAMI_CLIENT_ID after running: az identity show -g <RG> -n neuro-san-wi --query clientId -o tsv
azure:
  workloadIdentityClientId: "31036678-9d77-4e78-840b-93fba4233a90"
  keyVaultUrl: "https://neuro-san-hackathon-kv.vault.azure.net"

ingress:
  enabled: true
  # Backend and frontend get separate NGINX controllers -> separate public IPs
  neuroSan:
    className: nginx-backend
  ui:
    className: nginx-frontend

# Fill these in AFTER the cluster is up and NGINX controllers have their public IPs:
#   kubectl -n ingress-nginx-backend get svc ingress-nginx-backend-controller
#   kubectl -n ingress-nginx-frontend get svc ingress-nginx-frontend-controller
NEURO_SAN_SERVER_URL: "https://neurosanhackathon-api.eastus.cloudapp.azure.com"
AGENT_ALLOW_CORS_HEADERS: "true"
AGENT_RESERVATIONS_EXTERNAL_STORAGE_CHECK_PERIOD_SECONDS: "30"
AGENT_EXTERNAL_SERVER_URL: "https://neurosanhackathon-api.eastus.cloudapp.azure.com"
AGENT_SESSION_REQUIRE_HTTPS: "false"

# Azure Blob Storage for shared session state across all 4 key-pods
AGENT_EXTERNAL_RESERVATIONS_STORAGE: "neuro_san_studio.azure_blob_reservations_storage.AzureBlobReservationsStorage"
AGENT_RESERVATIONS_BLOB_CONTAINER: "neuro-san-reservations"

AGENT_NETWORK_DESIGNER_USE_RESERVATIONS: true
AGENT_NETWORK_DESIGNER_RESERVATIONS_LIFETIME_IN_SECONDS: 604800
AGENT_NETWORK_DESIGNER_PROGRESS_STYLE: connectivity
AGENT_MAX_CONCURRENT_REQUESTS: "250"
LEAF_LOG_SENSITIVE: "true"

# Azure OpenAI shared config (same deployment name and API version for all pods).
# Each pod gets its own AZURE_OPENAI_API_KEY and AZURE_OPENAI_ENDPOINT from its K8s secret.
OPENAI_API_VERSION: "2025-04-01-preview"
AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-5-mini"

hpa:
  enabled: false

llmConfigEnabled: true
llmConfigVariant: cluster

langfuse:
  enabled: false
  host: ""
